<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Гранат | Ювелирная мастерская</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="d-flex justify-content-between align-items-center py-3">
                <div class="d-flex align-items-center gap-2">
                    <img src="/images/логотип.png" width="40" alt="logo">
                    <span class="fw-semibold fs-4" style="color: #be1f1f;">Гранат</span>
                    <span class="text-secondary">|</span>
                    <span class="text-secondary small">Ювелирная мастерская</span>
                </div>
                <div class="d-flex gap-3 align-items-center">
                    <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                    <button id="historyBtn" class="icon-btn d-none"><i class="fas fa-clock"></i></button>
                    <div id="profileAvatar" class="profile-avatar"></div>
                    <button id="cartBtn" class="icon-btn cart-icon"><i class="fas fa-shopping-bag"></i><span id="cartCount" class="badge">0</span></button>
                </div>
            </div>
        </div>
    </header>

    <div class="hero-fullscreen">
        <div class="hero-overlay"></div>
        <div class="hero-content text-center text-white">
            <h1>Гранат</h1>
            <p>Ювелирная мастерская</p>
            <button class="btn btn-primary hero-btn" id="scrollToCatalog">Смотреть коллекцию</button>
        </div>
    </div>

    <main class="container" id="dynamicContent"></main>

    <!-- Модальные окна -->
    <div id="authModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 justify-content-center">
                    <h5 class="modal-title">Авторизация</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="authFormContainer"></div>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Товар</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="productModalBody"></div>
            </div>
        </div>
    </div>

    <div id="cartModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Корзина</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="cartModalBody"></div>
            </div>
        </div>
    </div>

    <div id="historyModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">История заказов</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="historyModalBody"></div>
            </div>
        </div>
    </div>

    <!-- Кастомная модалка для ввода (вместо prompt) -->
    <div id="inputModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Ювелирная мастерская Гранат</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="inputModalField" class="form-control" placeholder="">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="inputModalConfirm">Продолжить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка выбора ювелира (с выпадающим списком) -->
    <div id="jewelerSelectModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Назначить ювелира</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <select id="jewelerSelect" class="form-select"></select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="confirmJewelerBtn">Назначить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg"></div>

    <footer class="footer mt-5 py-3 text-center border-top">
        <div class="container">
            <hr class="w-25 mx-auto">
            <div><span class="footer-brand">Гранат | Ювелирная мастерская</span></div>
            <div class="footer-author">Автор: Филановская Марианна</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
