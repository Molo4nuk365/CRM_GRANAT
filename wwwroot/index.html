<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Гранат | Ювелирная мастерская</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Стили из style.css   -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">
    <header>
        <div class="container">
            <div class="header-flex">
                <div class="logo">
                    <img src="images/логотип.png" alt="Гранат" class="logo-img" onerror="this.src='https://placehold.co/40x40?text=G'">
                    <span class="logo-text">Гранат</span>
                    <span class="logo-divider">|</span>
                    <span class="logo-sub">Ювелирная мастерская</span>
                </div>
                <div class="header-actions">
                    <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                    <div id="profileAvatar" class="profile-avatar"></div>
                    <button id="cartBtn" class="icon-btn cart-icon"><i class="fas fa-shopping-bag"></i><span id="cartCount" class="badge">0</span></button>
                </div>
            </div>
        </div>
    </header>

    <main class="container" id="app">
        <!-- Полноэкранная фоновая картинка с затемнением -->
        <div class="hero-fullscreen">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>Гранат</h1>
                <p>Ювелирная мастерская</p>
                <button class="btn-primary" id="scrollToCatalog">Смотреть коллекцию</button>
            </div>
        </div>
        <div id="dynamicContent"></div>
    </main>

    <!-- Модальные окна -->
    <div id="authModal" class="modal fade custom-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 justify-content-center">
                    <h5 class="modal-title">Авторизация</h5>
                </div>
                <div class="modal-body" id="authFormContainer"></div>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Товар</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="productModalBody"></div>
            </div>
        </div>
    </div>

    <div id="cartModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Корзина</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="cartModalBody"></div>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg"></div>

    <!-- Футер -->
    <footer class="footer">
        <div class="container">
            <hr class="footer-divider">
            <div class="footer-text">
                <span class="footer-brand">Гранат</span> | Ювелирная мастерская <span class="footer-year">2026</span>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
